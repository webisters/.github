name: Bug report
description: Report a problem so we can fix it
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the
        details below so we can reproduce and fix the problem quickly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I do X, Y happens, but I expected Z.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps (or a code snippet) that reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.2.x"
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package / framework version
      placeholder: "e.g. 1.2.0 or commit SHA"
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11, Ubuntu 24.04"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages or stack traces. This is automatically formatted as code.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have confirmed the required PHP extensions are enabled.
          required: false
